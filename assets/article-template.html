<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章标题</title>
<style>
  :root {
    --bg: #fff;
    --text: #333;
    --text-light: #666;
    --text-gray: #999;
    --border: #e8e8e8;
    --accent: #d4a574;
    --nav-bg: #1a1a1a;
    --nav-text: #ccc;
    --toc-bg: #f9f9f9;
    --quote-bg: #f5f5f5;
    --max-width: 800px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 16px;
    line-height: 1.8;
    color: var(--text);
    background: var(--bg);
  }

  /* ========== 导航栏（仅预览用） ========== */
  .site-nav {
    background: var(--nav-bg);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .site-nav .logo {
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    text-decoration: none;
  }
  .site-nav .nav-links {
    display: flex;
    gap: 24px;
    list-style: none;
  }
  .site-nav .nav-links a {
    color: var(--nav-text);
    text-decoration: none;
    font-size: 14px;
    transition: color .2s;
  }
  .site-nav .nav-links a:hover { color: #fff; }

  /* ========== 文章头部 ========== */
  .article-header {
    text-align: center;
    padding: 60px 24px 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }
  .article-header h1 {
    font-size: 30px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  .article-header .subtitle {
    font-size: 16px;
    color: var(--text-light);
    margin-bottom: 8px;
  }
  .article-header .meta {
    font-size: 13px;
    color: var(--text-gray);
  }

  /* ========== 正文容器 ========== */
  .article-body {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  /* ========== 目录 ========== */
  .toc {
    background: var(--toc-bg);
    border-radius: 8px;
    padding: 28px 32px;
    margin-bottom: 48px;
  }
  .toc h2 {
    font-size: 18px;
    margin-bottom: 16px;
    color: var(--text);
  }
  .toc ol {
    list-style: none;
    counter-reset: toc-counter;
  }
  .toc li {
    counter-increment: toc-counter;
    padding: 6px 0;
    font-size: 15px;
    position: relative;
    padding-left: 28px;
  }
  .toc li::before {
    content: counter(toc-counter);
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 600;
  }
  .toc li a {
    color: var(--text);
    text-decoration: none;
    transition: color .2s;
  }
  .toc li a:hover { color: var(--accent); }
  .toc .img-range {
    color: var(--text-gray);
    font-size: 13px;
    margin-left: 6px;
  }

  /* ========== 章节标题 ========== */
  .article-body h2 {
    font-size: 24px;
    font-weight: 700;
    margin: 48px 0 20px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
    color: var(--text);
  }
  .article-body h2:first-of-type { margin-top: 0; }

  /* ========== 段落 ========== */
  .article-body p {
    margin-bottom: 18px;
    text-align: justify;
  }

  /* ========== 引用 ========== */
  .article-body blockquote {
    background: var(--quote-bg);
    border-left: 3px solid var(--accent);
    padding: 12px 18px;
    margin: 20px 0;
    color: var(--text-light);
    font-size: 14px;
    border-radius: 0 4px 4px 0;
  }
  .article-body blockquote p { margin-bottom: 0; }

  /* ========== 图片区 ========== */
  .photo-block {
    margin: 32px 0;
  }
  .photo-block img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 4px;
  }
  .photo-block figcaption {
    text-align: center;
    font-size: 14px;
    color: var(--text-gray);
    margin-top: 8px;
    line-height: 1.6;
  }
  .photo-block figcaption strong {
    color: var(--text-light);
    font-weight: 600;
  }

  /* ========== 图片标题（before 图注） ========== */
  .photo-title {
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-light);
    margin-top: 12px;
  }

  /* ========== 视频区 ========== */
  .video-block {
    margin: 32px 0;
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
    border-radius: 4px;
  }
  .video-block iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  /* ========== 分隔 ========== */
  .section-divider {
    text-align: center;
    color: var(--border);
    font-size: 14px;
    margin: 40px 0;
    letter-spacing: 4px;
  }

  /* ========== 页脚 ========== */
  .article-footer {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 40px 24px;
    border-top: 1px solid var(--border);
    text-align: center;
    color: var(--text-gray);
    font-size: 13px;
    line-height: 1.8;
  }

  /* ========== 响应式 ========== */
  @media (max-width: 640px) {
    .article-header { padding: 40px 16px 28px; }
    .article-header h1 { font-size: 24px; }
    .article-body { padding: 0 16px 40px; }
    .article-body h2 { font-size: 20px; margin: 36px 0 16px; }
    .toc { padding: 20px 20px; }
    .site-nav { padding: 10px 16px; }
    .site-nav .nav-links { gap: 14px; }
    .site-nav .nav-links a { font-size: 13px; }
  }
</style>
</head>
<body>

<!-- ========== 导航栏（预览用） ========== -->
<nav class="site-nav">
  <a href="#" class="logo">📷 图文报道</a>
  <ul class="nav-links">
    <li><a href="#toc">目录</a></li>
    <li><a href="#content">正文</a></li>
    <li><a href="#footer">关于</a></li>
  </ul>
</nav>

<!-- ========== 文章头部 ========== -->
<header class="article-header">
  <h1>文章标题</h1>
  <p class="subtitle">副标题 / 导语</p>
  <p class="meta">2026年7月20日 ｜ 摄影/撰文：Skylar</p>
</header>

<!-- ========== 正文 ========== -->
<article class="article-body" id="content">

  <!-- 目录 -->
  <nav class="toc" id="toc">
    <h2>📋 文章目录</h2>
    <ol>
      <li><a href="#s1">章节名</a> <span class="img-range">图1~4</span></li>
      <li><a href="#s2">章节名</a> <span class="img-range">图5~15</span></li>
    </ol>
  </nav>

  <!-- ===== 章节模板 ===== -->
  <section id="s1">
    <h2>章节标题</h2>
    <p>正文段落。中文与 English 之间要加空格。日期格式如 2026年7月17日。</p>

    <!-- 图片块 -->
    <figure class="photo-block">
      <img src="CMST_01.jpg" alt="照片描述" loading="lazy">
      <figcaption>▲ <strong>图1</strong> 照片描述文字</figcaption>
    </figure>
  </section>

  <section id="s2">
    <h2>另一个章节</h2>
    <p>更多正文内容……</p>

    <blockquote>
      <p>部分资料来自网络，如有出入欢迎指正。</p>
    </blockquote>
  </section>

  <!-- 视频块 -->
  <!--
  <figure class="video-block">
    <iframe src="https://player.bilibili.com/player.html?bvid=BV1roKC6yEQ7" allowfullscreen></iframe>
  </figure>
  -->

</article>

<!-- ========== 页脚 ========== -->
<footer class="article-footer" id="footer">
  <p>摄影/撰文：Skylar</p>
  <p>部分资料来自网络，如有出入欢迎指正</p>
  <p style="margin-top:8px;font-size:12px;">本文由 WorkBuddy 辅助编辑</p>
</footer>

</body>
</html>
